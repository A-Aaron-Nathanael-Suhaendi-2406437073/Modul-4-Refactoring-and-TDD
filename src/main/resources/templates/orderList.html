<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Order History for <span th:text="${author}">Author Name</span></h2>

    <div th:if="${orders == null or orders.isEmpty()}" class="alert alert-warning">
        No orders found for this name.
    </div>

    <table th:if="${orders != null and !orders.isEmpty()}" class="table table-bordered">
        <thead class="thead-dark">
        <tr>
            <th>Order ID</th>
            <th>Order Time</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">Order ID</td>
            <td th:text="${order.orderTime}">Order Time</td>
            <td th:text="${order.status}">Status</td>
            <td>
                <a th:if="${order.status == 'WAITING_PAYMENT'}"
                   th:href="@{/order/pay/{id}(id=${order.id})}"
                   class="btn btn-sm btn-success">Pay</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/order/history}" class="btn btn-secondary">Back to Search</a>
</div>
</body>
</html>
